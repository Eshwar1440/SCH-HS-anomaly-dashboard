version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    container_name: HS-SCH-backend

  frontend:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    container_name: HS-SCH-frontend